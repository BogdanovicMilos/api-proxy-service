repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0  # Use the ref you want to point at
    hooks:
    - id: trailing-whitespace
    - id: pretty-format-json
      args: [--autofix]
    - id: requirements-txt-fixer
    - id: sort-simple-yaml
    - id: mixed-line-ending
    - id: fix-encoding-pragma
    - id: end-of-file-fixer
      exclude: .idea/
    - id: detect-private-key
    - id: detect-aws-credentials
      args: [--allow-missing-credentials]
    - id: debug-statements
    - id: check-yaml
    - id: check-xml
    - id: check-symlinks
    - id: check-merge-conflict
    - id: check-json
    - id: check-executables-have-shebangs
    - id: check-docstring-first
    - id: check-case-conflict
    - id: check-byte-order-marker
    - id: check-builtin-literals
    - id: check-ast
    - id: check-added-large-files

-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        name: isort (python)
        args: ["--profile", "black", "--line-length=100", "--filter-files"]

-   repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
    -   id: black
        args:
            - --line-length=100
            - --include=\.pyi?$
            - --exclude=(\.git|\.venv|\.tox|__pycache__|_build|build|dist)

-   repo: local
    hooks:
    -   id: echo-routers
        name: Echo Routers
        entry: echo "Running pre-commit in routers directory"
        language: system
        files: ^api/application/schemas/.*\.py$

-   repo: https://github.com/pycqa/pylint
    rev: v3.2.2
    hooks:
    -   id: pylint
        args: [--max-line-length=100, --rcfile=.pylintrc]

-   repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
    -   id: flake8
        args: [--max-line-length=100]
